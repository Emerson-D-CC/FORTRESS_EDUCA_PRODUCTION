<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Panel Tickets - Fortress Educa{% endblock %}">
    <title>{% block titulo %}Panel Tickets - Fortress Educa{% endblock %}</title>

    <!-- Icono de la Pestaña -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/shield_gear.ico') }}" type="image/x-icon">
    
    <!-- Bootstrap 5 CSS -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='lib/bootstrap/css/bootstrap.min.css') }}">

    <!-- Font Awesome Icons -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/a    ax/libs/font-awesome/6.0.0/css/all.min.css"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='lib/fontawesome/css/all.min.css') }}">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Custom Especific CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tickets.css') }}">
    {% block head_extra %}{% endblock %}
</head>

<body>
    {% include 'includes/tickets_header.html' %}

    <div class="container-fluid">

        <div class="row g-4">
            {% include 'includes/tickets_sidebar.html' %}

            <!-- Bloque de contenido -->
            {% block Contenido_Pagina %}

            {% endblock %}

        </div>

    </div>

    <!-- Modal flash para errores -->
    {% include 'includes/modal_global.html' %}
    
    <!-- Bootstrap JS -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
    <script src="{{ url_for('static', filename='lib/bootstrap/js/bootstrap.bundle.min.js') }}"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/tickets.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
