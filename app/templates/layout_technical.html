<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Panel Tenicos Fortress Educa{% endblock %}">
    <title>{% block titulo %}Fortress Educa - Panel de Tecnicos{% endblock %}</title>

    <!-- Icono de la Pestaña -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/shield_gear.ico') }}" type="image/x-icon">
    
    <!-- Bootstrap 5 CSS -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='lib/bootstrap/css/bootstrap.min.css') }}">

    <!-- Font Awesome Icons -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='lib/fontawesome/css/all.min.css') }}">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Custom Especific CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/technical.css') }}">

    {% block head_extra %}{% endblock %}
</head>

<body>
    <div class="dashboard-container">
        {% include 'includes/technical_sidebar.html' %}

        <div class="dashboard-content">
            <!-- Bloque header -->
            {% include 'includes/technical_header.html' %}

            <!-- Bloque de contenido -->
            {% block Contenido_Pagina %}

            {% endblock %}

            <!-- Bloque logout modal -->
            {% include 'includes/logout_modal_tec.html' %}
        </div>
    </div>
    
    <!-- Modal flash para errores -->
    {% include 'includes/modal_global.html' %}
    
    <!-- Bootstrap JS -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
    <script src="{{ url_for('static', filename='lib/bootstrap/js/bootstrap.bundle.min.js') }}"></script>

    <!-- Chart JS -->
        <!-- Para crear graficos interactivos -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script> -->
     <script src="{{ url_for('static', filename='lib/chartjs/chart.umd.min.js') }}"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/technical.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
