<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}  {% endblock %}">
    <title>{% block titulo  %}Fortress Educa{% endblock %}</title>

    <!-- Icono de la Pestaña -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/shield.ico') }}">

    <!-- Bootstrap 5 CSS -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='lib/bootstrap/css/bootstrap.min.css') }}">

    <!-- Font Awesome Icons -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='lib/fontawesome/css/all.min.css') }}">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Custom Especific CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    {% block head_extra %}{% endblock %}
</head>

<body>

    <!-- Bloque de contenido -->
    {% block Contenido_Pagina %}

    {% endblock %}

    <!-- Sección fotter --> 
    <section id="fotter">
        <!-- Llamar fotter.html -->
        {% include 'includes/home_fotter.html' %}
    </section>

    <!-- Modal flash para errores -->
    {% include 'includes/modal_global.html' %}

    <!-- Bootstrap JS -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
    <script src="{{ url_for('static', filename='lib/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/home.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
